<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Counter App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>✨ EDIT #2</h1>
        <p>Click the buttons to manage your counter Venon </p>
        
        <div class="counter-display" id="counterDisplay">0</div>
        
        <div class="button-group">
            <button class="btn btn-decrease" id="decreaseBtn">➖ Decrease</button>
            <button class="btn btn-reset" id="resetBtn">🔄 Reset</button>
            <button class="btn btn-increase" id="increaseBtn">➕ Increase</button>
        </div>
        
        <div class="info-section">
            <p class="info-text">Total Clicks: <span id="totalClicks">0</span></p>
            <p class="info-text">Last Action: <span id="lastAction">None</span></p>
        </div>
        
        <button class="btn btn-save" id="saveBtn">💾 Save Data</button>
        <p class="status-message" id="statusMessage"></p>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
